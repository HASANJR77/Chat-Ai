<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <div class="header">
            <h1>🤖 Chat-AI</h1>
        </div>

        <div id="chat" class="chat">

            <div class="ai">
                Merhaba! Ben Chat-AI.
            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="message"
                placeholder="Mesaj yaz..."
            >

            <button id="send">
                Gönder
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
